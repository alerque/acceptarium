[graph]
all-features = true
exclude-dev = true

[bans]
multiple-versions = "allow"

[advisories]
ignore = [
  "RUSTSEC-2024-0436",
]

# Not exhaustive, just whitelist the current dependency tree
[licenses]
allow = [
  "AGPL-3.0-only",
  "Apache-2.0",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "CC0-1.0",
  "MIT",
  "MIT-0",
  "NCSA",
  "Unicode-3.0",
  "Zlib",
]
