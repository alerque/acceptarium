# off, error, warn, info, debug, or trace
verbosity = "info"
dry-run = false
overwrite = false
# filesystem, git-annex
storage = "filesystem"
# manual, ocr, vision
processor = "manual"
# manual, llm, regex, vision
extractor = "manual"

[filesystem]
directory = "acceptarium"
glob = "*.toml"
copy = false
rename = false
track = false

[git-annex]
directory = "acceptarium"

[vision]
model = "qwen3.5:9b"
preamble = """
You are a data extraction agent that analyzes scanned receipts and derives structured transaction data.
Always respond with valid JSON only, no additional text.\
"""
prompt = """The attached image is a scanned receipt or invoice in {{ config.extra.language }}.

{{ config.extra.prompt }}
"""

