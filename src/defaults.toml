# off, error, warn, info, debug, or trace
verbosity = "warn"
dry-run = false
overwrite = false
# filesystem, git-annex
storage = "filesystem"
# manual, ocr, vision
processor = "manual"
# manual, llm, regex, vision
extractor = "manual"
# hledger, ledger-cli, beancount, csv, json
format = "hledger"
template = "{{ config.extra.templates[config.format] }}"

[filesystem]
directory = "acceptarium"
glob = "*.toml"
copy = false
rename = false
track = false

[git-annex]
directory = "acceptarium"

[vision]
model = "{{ config.extra.model }}"
preamble = """
You are a data extraction agent that analyzes scanned receipts and derives structured transaction data.
Always respond with valid JSON only, no additional text.\
"""
prompt = """The attached image is a scanned receipt or invoice in {{ config.extra.language }}.

{{ config.extra.prompt }}
"""

[llm]
model = "{{ config.extra.model }}"
preamble = """
You are a data extraction agent that analyzes scanned receipts and derives structured transaction data.
Always respond with valid JSON only, no additional text.\
"""
prompt = """The following content is a scanned receipt or invoice in {{ config.extra.language }} read with OCR.

{{ config.extra.prompt }}

Receipt content:
{{ asset.ocr }}\
"""

[extra]
## some data, but many mistakes
# model = "gemma3:27b"
## many fields wrong
# model = "granite3.2-vision:latest"
## solid results at medium speed, line items for tax entries, sometimes bogus json
# model = "llama3.2-vision:11b"
## slow and best
# model = "qwen3.5:35b"
## fast and pretty good
model = "qwen3.5:9b"

## summary of example with no json
# model = "bakllava:7b"
## no results
# model = "deepseek-ocr:3b"
## made up everything
# model = "gemma3:4b"
## made up some, used example for some
# model = "gemma3n:e4b"
## used example
# model = "glm-ocr:bf16"

prompt = """
Look for and extract the following fields in the receipt:
{{ config.extra.field_descriptions }}

Return a JSON object with as many of those fields as were positively detected, for example:
{{ config.extra.sample_json }}\
"""
field_descriptions = """
{% for field in config.extra.fields -%}
- **{{ field.key }}**: {{ field.desc }}
{% endfor -%}
"""
# Note when Tera 2 is released we should be able to directly encode the map we want and json_encode it
sample_json = """
{
{% for field in config.extra.fields -%}
  "{{ field.key }}": {{ field.sample | json_encode(pretty=true) | safe }}
{%- if not loop.last -%},{%- endif %}
{% endfor -%}
}
"""
language = "Turkish"

[extra.templates]
hledger = """
{{- asset.transaction.datetime | date(format="%Y-%m-%d") }}
{{- " (" ~ asset.id }}{% if asset.transaction.invoice_number %}{{ "|" ~ asset.transaction.invoice_number }}{% endif %})
{{- " " }}{{ asset.transaction.payee | default(value="Unknown") }}
{%- if asset.transaction.items %}
{%- for posting in asset.transaction.items %}
    dst          {{ posting.quantity | default(value=1)}} @@ {{ posting.amount | default(value=0) }}  ; {{ posting.description | default(value="") }}
{%- endfor %}
{%- endif %}
    src          {{ asset.transaction.total | default(value=0) }}  ; type:{{ asset.transaction.payment_type | default(value="") }}, {{ asset.transaction.payment_identifier | default(value="") }}
"""

[[extra.fields]]
key = "payee"
desc = "The vendor, merchant, or payee name, preferring the common business name over corporate divisions"
sample = "My Store Name"

[[extra.fields]]
key = "datetime"
desc = "The transaction date in ISO 8601 format (YYYY-MM-DD), or include time (YYYY-MM-DDTHH:MM:SS) if the transaction time can be determined"
sample = 2024-01-15T14:30:00

[[extra.fields]]
key = "type"
desc = "The financial document type, most likely 'receipt' or 'invoice'"
sample = "receipt"

[[extra.fields]]
key = "invoice_number"
desc = "A receipt or invoice number if visible (can be null) that would uniquely identify the transaction to the merchant"
sample = "A000012345"

[[extra.fields]]
key = "items"
desc = "An array of items with description, quantity, and total amount (as a number) for each line item"
sample = "{{ config.extra.items | json_encode(pretty=true) | safe }}"

[[extra.fields]]
key = "total"
desc = "The final total amount with all items, taxes, discounts, fees, etc. as a number without currency symbols"
sample = 125.50

[[extra.fields]]
key = "currency"
desc = "The currency used as its ISO code, for example 'TRY' or 'USD'"
sample = "TRY"

[[extra.fields]]
key = "payment_type"
desc = "The payment method used - 'cash', 'credit', 'debt', 'check', or 'other'"
sample = "card"

[[extra.fields]]
key = "payment_identifier"
desc = "The last 4 digits of card or other identifier if visible (can be null)"
sample = "**** **** **** 1234"

[[extra.items]]
description = "Item A"
quantity = 1
amount = 50.00

[[extra.items]]
description = "Thing B"
quantity = 2
amount = 37.75
